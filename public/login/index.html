<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Alma.+</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f7f8fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { width: 100%; max-width: 420px; }
.logo { text-align: center; margin-bottom: 32px; }
.logo a { text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
.logo-mark { width: 32px; height: 32px; border-radius: 7px; background: #1e3a6e; display: flex; align-items: center; justify-content: center; }
.logo-name { font-family: 'Inter Tight', sans-serif; font-weight: 800; font-size: 17px; color: #0f1729; }
.logo-name span { color: #1e3a6e; }
.box { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); padding: 36px 40px; box-shadow: 0 4px 24px rgba(30,58,110,0.08); }
.tabs { display: flex; background: #f7f8fa; border-radius: 8px; padding: 4px; margin-bottom: 28px; }
.tab { flex: 1; padding: 9px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.15s; }
.tab.active { background: #fff; color: #0f1729; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.tab.inactive { background: transparent; color: #94a3b8; }
.alert { display: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
.alert.error { background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.2); color: #dc2626; }
.alert.success { background: rgba(22,163,74,0.06); border: 1px solid rgba(22,163,74,0.2); color: #16a34a; }
label { font-size: 12px; font-weight: 600; color: #4a5568; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.12); font-size: 14px; font-family: inherit; outline: none; margin-bottom: 14px; }
input:focus { border-color: #1e3a6e; }
.btn-submit { width: 100%; background: #1e3a6e; color: #fff; border: none; border-radius: 9px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 6px; }
.btn-submit:hover { background: #152d57; }
.btn-forgot { font-size: 12px; color: #94a3b8; background: none; border: none; cursor: pointer; text-decoration: underline; display: block; margin: 12px auto 0; }
.note { text-align: center; margin-top: 16px; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <a href="/">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14" fill="none" width="14" height="14"><path d="M2 12L7 2L12 12" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M4 8.5H10" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-name">Alma<span>.</span>+</span>
    </a>
  </div>
  <div class="box">
    <div class="tabs">
      <button class="tab active" id="tab0" onclick="setTab(0)">Se connecter</button>
      <button class="tab inactive" id="tab1" onclick="setTab(1)">Créer un compte</button>
    </div>
    <div class="alert error" id="error"></div>
    <div class="alert success" id="success"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••">
    <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">Se connecter →</button>
    <button class="btn-forgot" onclick="resetPassword()">Mot de passe oublié ?</button>
  </div>
  <p class="note">7 jours gratuits · CB requise · Annulable à tout moment</p>
</div>

<script>
var SUPABASE_URL = https://tzrtptpzbrszibuifzns.supabase.co
var SUPABASE_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6cnRwdHB6YnJzemlidWlmem5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODQ0NzAsImV4cCI6MjA4OTM2MDQ3MH0.vnz7yDXA6ZdYx0YU1zZ8UjIng_4bob8t-gYlP9a0mgk
var isSignup = false
var sb = null

function initSupabase() {
  if (window.supabase && SUPABASE_URL !== 'REMPLACE_PAR_TON_URL') {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  }
}

function setTab(i) {
  isSignup = i === 1
  var t0 = document.getElementById('tab0')
  var t1 = document.getElementById('tab1')
  var btn = document.getElementById('btn-submit')
  t0.className = i === 0 ? 'tab active' : 'tab inactive'
  t1.className = i === 1 ? 'tab active' : 'tab inactive'
  btn.textContent = i === 0 ? 'Se connecter →' : 'Créer mon compte →'
  document.getElementById('error').style.display = 'none'
  document.getElementById('success').style.display = 'none'
}

async function handleSubmit() {
  var email = document.getElementById('email').value
  var password = document.getElementById('password').value
  var errEl = document.getElementById('error')
  var sucEl = document.getElementById('success')
  errEl.style.display = 'none'
  sucEl.style.display = 'none'
  if (!email || !password) {
    errEl.textContent = 'Remplissez tous les champs.'
    errEl.style.display = 'block'
    return
  }
  if (!sb) {
    errEl.textContent = 'Erreur de configuration Supabase.'
    errEl.style.display = 'block'
    return
  }
  if (isSignup) {
    var r = await sb.auth.signUp({ email: email, password: password })
    if (r.error) { errEl.textContent = r.error.message; errEl.style.display = 'block' }
    else { sucEl.textContent = 'Vérifiez votre email pour confirmer.'; sucEl.style.display = 'block' }
  } else {
    var r = await sb.auth.signInWithPassword({ email: email, password: password })
    if (r.error) { errEl.textContent = 'Email ou mot de passe incorrect.'; errEl.style.display = 'block' }
    else { window.location.href = '/dashboard' }
  }
}

async function resetPassword() {
  var email = document.getElementById('email').value
  var errEl = document.getElementById('error')
  var sucEl = document.getElementById('success')
  if (!email) { errEl.textContent = "Entrez votre email d'abord."; errEl.style.display = 'block'; return }
  if (!sb) return
  await sb.auth.resetPasswordForEmail(email)
  sucEl.textContent = 'Email de réinitialisation envoyé.'
  sucEl.style.display = 'block'
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>initSupabase()</script>
</body>
</html>
