<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Alma.+</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@800;900&display=swap" rel="stylesheet">
</head>
<body style="margin:0;font-family:'Inter',sans-serif;background:#f7f8fa;min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:420px;padding:24px">
    <div style="text-align:center;margin-bottom:32px">
      <a href="/" style="text-decoration:none;display:inline-flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:7px;background:#1e3a6e;display:flex;align-items:center;justify-content:center">
          <svg viewBox="0 0 14 14" fill="none" width="14" height="14"><path d="M2 12L7 2L12 12" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M4 8.5H10" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <span style="font-family:'Inter Tight',sans-serif;font-weight:800;font-size:17px;color:#0f1729">Alma<span style="color:#1e3a6e">.</span>+</span>
      </a>
    </div>
    <div style="background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.08);padding:36px 40px;box-shadow:0 4px 24px rgba(30,58,110,0.08)">
      <div style="display:flex;background:#f7f8fa;border-radius:8px;padding:4px;margin-bottom:28px">
        <button onclick="setTab(0)" id="tab0" style="flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:#fff;color:#0f1729;box-shadow:0 1px 4px rgba(0,0,0,0.08)">Se connecter</button>
        <button onclick="setTab(1)" id="tab1" style="flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:transparent;color:#94a3b8">Créer un compte</button>
      </div>
      <div id="error" style="display:none;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:14px"></div>
      <div id="success" style="display:none;background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#16a34a;margin-bottom:14px"></div>
      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:6px">Email</label>
        <input id="email" type="email" placeholder="votre@email.com" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:6px">Mot de passe</label>
        <input id="password" type="password" placeholder="••••••••" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box">
      </div>
      <button onclick="handleSubmit()" style="width:100%;background:#1e3a6e;color:#fff;border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Se connecter →</button>
      <div style="text-align:center;margin-top:14px">
        <button onclick="resetPassword()" style="font-size:12px;color:#94a3b8;background:none;border:none;cursor:pointer;text-decoration:underline">Mot de passe oublié ?</button>
      </div>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:#94a3b8">7 jours gratuits · CB requise · Annulable à tout moment</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'REMPLACE_PAR_TON_URL'
    const SUPABASE_KEY = 'REMPLACE_PAR_TON_ANON_KEY'
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let isSignup = false

    function setTab(i) {
      isSignup = i === 1
      document.getElementById('tab0').style.background = i === 0 ? '#fff' : 'transparent'
      document.getElementById('tab0').style.color = i === 0 ? '#0f1729' : '#94a3b8'
      document.getElementById('tab0').style.boxShadow = i === 0 ? '0 1px 4px rgba(0,0,0,0.08)' : 'none'
      document.getElementById('tab1').style.background = i === 1 ? '#fff' : 'transparent'
      document.getElementById('tab1').style.color = i === 1 ? '#0f1729' : '#94a3b8'
      document.getElementById('tab1').style.boxShadow = i === 1 ? '0 1px 4px rgba(0,0,0,0.08)' : 'none'
      document.querySelector('button[onclick="handleSubmit()"]').textContent = i === 0 ? 'Se connecter →' : 'Créer mon compte →'
    }

    async function handleSubmit() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errEl = document.getElementById('error')
      const sucEl = document.getElementById('success')
      errEl.style.display = 'none'
      sucEl.style.display = 'none'
      if (!email || !password) { errEl.textContent = 'Remplissez tous les champs.'; errEl.style.display = 'block'; return }
      if (isSignup) {
        const { error } = await supabase.auth.signUp({ email, password })
        if (error) { errEl.textContent = error.message; errEl.style.display = 'block' }
        else { sucEl.textContent = 'Vérifiez votre email pour confirmer.'; sucEl.style.display = 'block' }
      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password })
        if (error) { errEl.textContent = 'Email ou mot de passe incorrect.'; errEl.style.display = 'block' }
        else { window.location.href = '/dashboard' }
      }
    }

    async function resetPassword() {
      const email = document.getElementById('email').value
      if (!email) { document.getElementById('error').textContent = "Entrez votre email d'abord."; document.getElementById('error').style.display = 'block'; return }
      await supabase.auth.resetPasswordForEmail(email)
      document.getElementById('success').textContent = 'Email de réinitialisation envoyé.'
      document.getElementById('success').style.display = 'block'
    }
  </script>
</body>
</html>
